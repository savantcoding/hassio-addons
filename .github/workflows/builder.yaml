---
name: Builder

# Builds and publishes the multi-arch add-on image to GHCR.

on:
  push:
    branches:
      - main
    paths:
      - "netmaker/**"
      - ".github/workflows/builder.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "netmaker/**"
  workflow_dispatch:

env:
  ADDON: netmaker

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
            base: ghcr.io/hassio-addons/base/aarch64:21.0.0
          - arch: amd64
            platform: linux/amd64
            base: ghcr.io/hassio-addons/base/amd64:21.0.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: info
        run: |
          version=$(grep -E '^version:' "${ADDON}/config.yaml" | awk '{print $2}' | tr -d '"')
          image=$(grep -E '^image:' "${ADDON}/config.yaml" | awk '{print $2}' | tr -d '"')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.arch }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.ADDON }}
          file: ./${{ env.ADDON }}/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          build-args: |
            BUILD_FROM=${{ matrix.base }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=${{ steps.info.outputs.version }}
            BUILD_NAME=Netmaker
            BUILD_DESCRIPTION=Join your Home Assistant instance to a Netmaker WireGuard network
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_REF=${{ github.sha }}
          tags: |
            ${{ steps.info.outputs.image }}-${{ matrix.arch }}:${{ steps.info.outputs.version }}
            ${{ steps.info.outputs.image }}-${{ matrix.arch }}:latest
            ${{ steps.info.outputs.image }}-${{ matrix.arch }}:sha-${{ github.sha }}

  manifest:
    name: Publish manifest
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      ADDON: netmaker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: info
        run: |
          version=$(grep -E '^version:' "${ADDON}/config.yaml" | awk '{print $2}' | tr -d '"')
          image=$(grep -E '^image:' "${ADDON}/config.yaml" | awk '{print $2}' | tr -d '"')
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifests
        run: |
          IMAGE="${{ steps.info.outputs.image }}"
          VERSION="${{ steps.info.outputs.version }}"
          SHA="${{ github.sha }}"
          for tag in "${VERSION}" "latest" "sha-${SHA}"; do
            docker manifest create "${IMAGE}:${tag}" \
              "${IMAGE}-aarch64:${tag}" \
              "${IMAGE}-amd64:${tag}"
            docker manifest push "${IMAGE}:${tag}"
          done

  release:
    name: Tag release
    needs: manifest
    # Only tag on real pushes to main, never on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ADDON: netmaker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: info
        run: |
          version=$(grep -E '^version:' "${ADDON}/config.yaml" | awk '{print $2}' | tr -d '"')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Create tag and release if new
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          TAG="${ADDON}-v${VERSION}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1 \
            || gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Tag/release ${TAG} already exists — nothing to do."
            exit 0
          fi
          echo "Creating release ${TAG} at ${GITHUB_SHA}"
          gh release create "${TAG}" \
            --target "${GITHUB_SHA}" \
            --title "${ADDON} v${VERSION}" \
            --notes "Automated release for ${ADDON} v${VERSION}.

          Image: \`ghcr.io/${{ github.repository_owner }}/app-${ADDON}:${VERSION}\`
          Commit: ${GITHUB_SHA}"
