---
name: Builder

# Builds and publishes the multi-arch add-on image to GHCR.
# Publishes on pushes to main that touch the add-on, and on tags.

on:
  push:
    branches:
      - main
    paths:
      - "netmaker/**"
      - ".github/workflows/builder.yaml"
    tags:
      - "*"
  pull_request:
    branches:
      - main
    paths:
      - "netmaker/**"
  workflow_dispatch:

env:
  ADDON: netmaker

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - aarch64
          - amd64
          - armv7
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get add-on info
        id: info
        run: |
          version=$(yq --no-colors eval '.version' "${ADDON}/config.yaml")
          image=$(yq --no-colors eval '.image' "${ADDON}/config.yaml")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ${{ matrix.arch }} add-on
        uses: home-assistant/builder@2025.03.0
        with:
          args: |
            ${{ github.event_name != 'pull_request' && '--docker-hub-check' || '' }} \
            --${{ matrix.arch }} \
            --target /data/${{ env.ADDON }} \
            --image "${{ steps.info.outputs.image }}" \
            --docker-user "${{ github.actor }}" \
            --docker-password "${{ secrets.GITHUB_TOKEN }}" \
            --addon \
            ${{ github.event_name == 'pull_request' && '--test' || '' }}
