worker_processes  1;
pid /var/run/nginx-ingress.pid;
error_log /proc/1/fd/1 warn;

events {
    worker_connections  512;
}

http {
    include         /etc/nginx/mime.types;
    default_type    application/octet-stream;
    access_log      off;
    sendfile        on;
    keepalive_timeout  65;

    client_body_temp_path /tmp/nginx-ingress/client_body;
    proxy_temp_path       /tmp/nginx-ingress/proxy;
    fastcgi_temp_path     /tmp/nginx-ingress/fastcgi;
    uwsgi_temp_path       /tmp/nginx-ingress/uwsgi;
    scgi_temp_path        /tmp/nginx-ingress/scgi;

    server {
        # Home Assistant ingress connects from the Supervisor only.
        listen 8099 default_server;

        include /etc/nginx/includes/server_params.conf;

        root /var/www/netmaker;
        index index.html;

        # Only the Supervisor ingress network may reach this panel.
        allow 172.30.32.2;
        deny all;

        location / {
            try_files $uri $uri/ =404;
        }

        # Live status snapshot, refreshed by the ingress-status service.
        location = /status.json {
            add_header Cache-Control "no-store";
            try_files /status.json =503;
        }
    }
}
