<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Netmaker</title>
<style>
  :root {
    --bg: #0d0e12;
    --panel: #16171d;
    --panel-2: #1a1b23;
    --border: #262832;
    --border-soft: #20222b;
    --text: #f4f5f7;
    --text-muted: #9095a3;
    --text-dim: #6b7080;
    --accent: #6366f1;
    --accent-hover: #7c6df2;
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.15);
    --red: #ef4444;
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto,
      Helvetica, Arial, sans-serif;
    --mono: "SFMono-Regular", ui-monospace, "Cascadia Code", Menlo, Consolas,
      monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Thin accent gradient bar at the very top */
  .topbar {
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, #4f46e5 0%, #7c6df2 50%, #a855f7 100%);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 20px 48px;
  }

  /* Header row: icon + title + status + refresh */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0 20px;
    flex-wrap: wrap;
  }
  .header .logo {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(160deg, #6366f1, #4036e3);
    display: grid;
    place-items: center;
    color: #fff;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(79, 70, 229, 0.35);
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .header .sub {
    color: var(--text-muted);
    font-size: 13px;
  }
  .header .spacer { flex: 1; }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    font-weight: 600;
    padding: 4px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  .status-pill .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }
  .status-pill.online {
    color: var(--green);
    border-color: rgba(34, 197, 94, 0.35);
    background: var(--green-dim);
  }
  .status-pill.online .dot {
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
  }

  .refreshed {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Card grid */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  @media (max-width: 820px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-head {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 15px 18px;
    border-bottom: 1px solid var(--border-soft);
    font-weight: 600;
    font-size: 14.5px;
  }
  .card-head svg { color: var(--accent); flex-shrink: 0; }
  .card-body { padding: 4px 18px 10px; }

  /* label / value rows */
  .row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border-soft);
    min-height: 44px;
  }
  .row:last-child { border-bottom: none; }
  .row .label {
    color: var(--text-muted);
    font-size: 13px;
    width: 42%;
    flex-shrink: 0;
    padding-top: 1px;
  }
  .row .value {
    color: var(--text);
    font-weight: 600;
    font-size: 13.5px;
    word-break: break-word;
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .row .value.mono { font-family: var(--mono); font-weight: 500; font-size: 12.5px; }
  .value .muted { color: var(--text-dim); font-weight: 500; }

  .copy {
    cursor: pointer;
    color: var(--text-dim);
    display: inline-flex;
    opacity: 0;
    transition: opacity 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .row:hover .copy { opacity: 1; }
  .copy:hover { color: var(--accent); }
  .copy.copied { color: var(--green); opacity: 1; }

  .yes { color: var(--green); }
  .no { color: var(--text-dim); }

  /* Peers table */
  .section-title {
    margin: 28px 0 12px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .table-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-dim);
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    white-space: nowrap;
  }
  tbody td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 13px;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--panel-2); }
  td.mono { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
  }
  .pill.up { color: var(--green); background: var(--green-dim); }
  .pill.down { color: var(--text-dim); background: rgba(148, 150, 163, 0.12); }
  .empty {
    padding: 28px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  .disconnected-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(239, 68, 68, 0.08);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 18px;
    font-size: 13.5px;
  }
  .disconnected-banner.show { display: flex; }

  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="topbar"></div>
  <div class="wrap">

    <div class="header">
      <div class="logo">N</div>
      <div>
        <h1 id="node-name">Netmaker</h1>
        <div class="sub" id="node-network">&nbsp;</div>
      </div>
      <div class="spacer"></div>
      <span class="status-pill" id="status-pill"><span class="dot"></span><span id="status-text">Unknown</span></span>
      <span class="refreshed" id="refreshed"></span>
    </div>

    <div class="disconnected-banner" id="banner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>
      <span>This node is not currently connected to a Netmaker network. Check the add-on logs and your enrollment token.</span>
    </div>

    <div class="grid">
      <!-- Device network settings -->
      <div class="card">
        <div class="card-head">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
          Device network settings
        </div>
        <div class="card-body" id="net-card"></div>
      </div>

      <!-- Global device settings -->
      <div class="card">
        <div class="card-head">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          Global device settings
        </div>
        <div class="card-body" id="global-card"></div>
      </div>
    </div>

    <div class="section-title">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Peers
    </div>
    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Peer</th>
            <th>Endpoint</th>
            <th>Allowed IPs</th>
            <th>Handshake</th>
            <th>Transfer</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="peers-body">
          <tr><td colspan="6" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>

<script>
(function () {
  "use strict";

  var copyIcon =
    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
    '<rect x="9" y="9" width="13" height="13" rx="2"/>' +
    '<path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function hasVal(v) {
    return v !== null && v !== undefined && v !== "" && v !== 0 && v !== "0";
  }

  // Build a label/value row. opts: {mono, copy, yesno, raw}
  function row(label, value, opts) {
    opts = opts || {};
    var display;
    if (opts.yesno !== undefined) {
      display = opts.yesno
        ? '<span class="yes">Yes</span>'
        : '<span class="no">No</span>';
    } else if (value === null || value === undefined || value === "") {
      display = '<span class="muted">&mdash;</span>';
    } else {
      display = opts.raw ? value : esc(value);
    }

    var copy = "";
    if (opts.copy && value != null && value !== "") {
      copy =
        '<span class="copy" data-copy="' + esc(value) + '" title="Copy">' +
        copyIcon + "</span>";
    }

    return (
      '<div class="row"><div class="label">' + esc(label) + "</div>" +
      '<div class="value' + (opts.mono ? " mono" : "") + '">' +
      display + copy + "</div></div>"
    );
  }

  function fmtAge(sec) {
    if (sec == null || sec < 0) return null;
    if (sec < 5) return "just now";
    if (sec < 60) return sec + "s ago";
    if (sec < 3600) return Math.floor(sec / 60) + "m ago";
    if (sec < 86400) return Math.floor(sec / 3600) + "h ago";
    return Math.floor(sec / 86400) + "d ago";
  }

  function fmtBytes(n) {
    n = Number(n) || 0;
    if (n < 1024) return n + " B";
    var u = ["KiB", "MiB", "GiB", "TiB"], i = -1;
    do { n /= 1024; i++; } while (n >= 1024 && i < u.length - 1);
    return n.toFixed(1) + " " + u[i];
  }

  function shortKey(k) {
    if (!k) return "";
    return k.length > 20 ? k.slice(0, 10) + "…" + k.slice(-6) : k;
  }

  function render(d) {
    var node = (d.nodes && d.nodes[0]) || {};
    var host = d.host || {};
    var sys = d.system || {};
    var peers = d.peers || [];

    // Connection heuristic: node says connected, OR any peer handshaked recently.
    var recentPeer = peers.some(function (p) {
      return p.handshake_age >= 0 && p.handshake_age < 180;
    });
    var connected =
      node.connected === true || node.connected === "true" || recentPeer;

    // Header
    document.getElementById("node-name").textContent = host.name || node.id ? (host.name || "Netmaker node") : "Netmaker";
    document.getElementById("node-network").textContent = node.network
      ? node.network + " network"
      : "Not joined to a network";

    var pill = document.getElementById("status-pill");
    var stext = document.getElementById("status-text");
    if (connected) {
      pill.className = "status-pill online";
      stext.textContent = "Online";
    } else {
      pill.className = "status-pill";
      stext.textContent = "Offline";
    }

    document.getElementById("banner").className =
      "disconnected-banner" + (node.network && !connected ? " show" : "");

    // Device network settings card
    var addr = node.address || d.mesh_ip || null;
    var netHtml =
      row("Device Network ID", node.id, { mono: true, copy: true }) +
      row("Network", node.network) +
      row("IP Address (IPv4)", addr, { mono: true, copy: true }) +
      row("IP Address (IPv6)", node.address6, { mono: true, copy: true }) +
      row("Interface", d.interface, { mono: true }) +
      row("Is Connected", null, { yesno: connected });
    document.getElementById("net-card").innerHTML = netHtml;

    // Global device settings card
    var globalHtml =
      row("ID", host.id, { mono: true, copy: true }) +
      row("Name", host.name, { copy: true }) +
      row("Listen Port", host.listenport, { mono: true }) +
      row("MTU", host.mtu, { mono: true }) +
      (hasVal(host.keepalive)
        ? row("Persistent Keepalive", host.keepalive + "s", { mono: true })
        : "") +
      row("Public Key", host.publickey, { mono: true, copy: true }) +
      row("Operating System", sys.os) +
      row("Kernel Version", sys.kernel, { mono: true }) +
      row("Architecture", sys.arch, { mono: true }) +
      row("Client Version", sys.client_version, { mono: true });
    document.getElementById("global-card").innerHTML = globalHtml;

    // Peers table
    var body = document.getElementById("peers-body");
    if (!peers.length) {
      body.innerHTML =
        '<tr><td colspan="6" class="empty">No peers. ' +
        (node.network
          ? "Waiting for WireGuard peers to appear."
          : "This node is not joined to a network yet.") +
        "</td></tr>";
    } else {
      body.innerHTML = peers
        .map(function (p) {
          var up = p.handshake_age >= 0 && p.handshake_age < 180;
          var age = fmtAge(p.handshake_age);
          return (
            "<tr>" +
            '<td class="mono" title="' + esc(p.publickey) + '">' +
              esc(shortKey(p.publickey)) + "</td>" +
            '<td class="mono">' + (p.endpoint && p.endpoint !== "(none)" ? esc(p.endpoint) : '<span class="no">&mdash;</span>') + "</td>" +
            '<td class="mono">' + (p.allowed && p.allowed !== "(none)" ? esc(p.allowed) : '<span class="no">&mdash;</span>') + "</td>" +
            "<td>" + (age ? esc(age) : '<span class="no">never</span>') + "</td>" +
            '<td class="mono">&darr;' + fmtBytes(p.rx) + " &uarr;" + fmtBytes(p.tx) + "</td>" +
            "<td>" +
              (up
                ? '<span class="pill up">&bull; Active</span>'
                : '<span class="pill down">&bull; Idle</span>') +
            "</td></tr>"
          );
        })
        .join("");
    }

    // Refreshed timestamp
    var r = document.getElementById("refreshed");
    if (d.generated) {
      r.textContent = "Updated " + new Date(d.generated * 1000).toLocaleTimeString();
    } else {
      r.textContent = "";
    }
  }

  // Copy-to-clipboard (event delegation)
  document.addEventListener("click", function (e) {
    var t = e.target.closest(".copy");
    if (!t) return;
    var val = t.getAttribute("data-copy");
    var done = function () {
      t.classList.add("copied");
      setTimeout(function () { t.classList.remove("copied"); }, 1000);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(val).then(done, done);
    } else {
      var ta = document.createElement("textarea");
      ta.value = val; document.body.appendChild(ta); ta.select();
      try { document.execCommand("copy"); } catch (_) {}
      document.body.removeChild(ta); done();
    }
  });

  var failures = 0;
  function poll() {
    fetch("status.json", { cache: "no-store" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (d) { failures = 0; render(d); })
      .catch(function () {
        failures++;
        if (failures > 3) {
          document.getElementById("refreshed").textContent = "Status unavailable";
        }
      });
  }

  poll();
  setInterval(poll, 5000);
})();
</script>
</body>
</html>
